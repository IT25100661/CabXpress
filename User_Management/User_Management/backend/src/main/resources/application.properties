spring.application.name=CabXpress
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties],optional:file:backend/.env[.properties],optional:file:cabxpress/backend/.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cabxpress_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

spring.mail.host=${MAIL_HOST:smtp.example.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.jwt.secret=${JWT_SECRET:change_this_secret_for_local_development_only}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.mail-from=${MAIL_FROM:no-reply@cabxpress.test}
app.mock-email=${MOCK_EMAIL:false}
app.mock-payment=${MOCK_PAYMENT:false}
app.mock-maps=${MOCK_MAPS:false}

openroute.api.key=${OPENROUTE_API_KEY:}
openroute.base-url=${ORS_BASE_URL:https://api.openrouteservice.org}
osrm.base-url=${OSRM_BASE_URL:https://router.project-osrm.org}
stripe.secret-key=${STRIPE_SECRET_KEY:}

springdoc.swagger-ui.path=/swagger-ui.html
server.error.include-stacktrace=never
